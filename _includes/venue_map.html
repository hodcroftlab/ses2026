<!-- Interactive map for train station route to venue -->
<div id="venue-map" style="height: 400px; margin: 20px 0; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script>
  // Initialize map centered on Disentis
  const map = L.map('venue-map').setView([46.706, 8.855], 15);
  
  // Add OpenStreetMap tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);
  
  // Load GeoJSON route
  fetch('{{ "/assets/data/train-route.geojson" | relative_url }}')
    .then(res => res.json())
    .then(data => {
      // Add route as a teal-colored line
      L.geoJSON(data, {
        style: {
          color: '#2AA7B8',
          weight: 4,
          opacity: 0.8
        }
      }).addTo(map);
      
      // Get route bounds and fit
      const bounds = L.geoJSON(data).getBounds();
      map.fitBounds(bounds, { padding: [50, 50] });
    })
    .catch(err => console.error('Error loading route:', err));
  
  // Train station marker (start point)
  L.marker([8.85525, 46.70505], {
    title: 'Disentis/Mustér Train Station',
    icon: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    })
  })
  .bindPopup('<strong>Disentis/Mustér Station</strong><br>~10 min walk to hotel')
  .addTo(map);
  
  // Venue marker (end point)
  L.marker([8.85556, 46.70662], {
    title: 'Hotel Kloster Disentis',
    icon: L.icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
      shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    })
  })
  .bindPopup('<strong>Hotel Kloster Disentis</strong><br>The Symposium Venue')
  .addTo(map);
</script>
