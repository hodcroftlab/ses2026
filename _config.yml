title: "1st Swiss Enterovirus Symposium"
tagline: "Enterovirus Research and Surveillance: Strengthening Networks in Europe and Beyond"
description: "A focused, in-person symposium uniting virology, epidemiology, bioinformatics, and clinical science."
# GitHub Pages under hodcroftlab/ses2026:
url: "https://ses2026.org"
baseurl: ""

# Event metadata
event:
  name: "1st Swiss Enterovirus Symposium"
  dates: "5-8 October 2026"
  location_short: "Disentis, Switzerland"
  venue: "Historic monastery in Disentis"
  venue_name: "Hotel Kloster Disentis"
  venue_url: "https://www.hotel-kloster.ch/"
  venue_description: "A former Benedictine monastery now converted into a hotel, combining historic charm with simple, modern facilities. Surrounded by the Swiss Alps, it provides a quiet environment ideal for focused discussions."
  contact_email: "eve-group@swisstph.ch"
  organizer: "EVE Group, Swiss TPH & University of Basel"
  registration_url: "#"
  registration_open: false
  abstract_submission:
    enabled: false
    deadline: "TBD"
    url: "#"
  venue_map:
    enabled: true  # For future use if you add the interactive map
    travel:
      train_duration_zurich: "2.5 hours"
      train_duration_basel: "3.5 hours"
      walk_duration: "10 minutes"
  abstract_deadline: "June 30, 2026"
  registration_deadline: "July 31, 2026"
  early_bird: "July 15, 2026"

# Design options
design:
  colors:
    teal: "#2AA7B8"
    sand: "#F3EFE6"
    ink: "#1F2A33"
    muted: "#5D6B78"
    line: "#CDBFAF"
    accent: "#B08B62"
  hero_image: "/assets/img/hero_cropped.jpg"

markdown: kramdown
permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor


